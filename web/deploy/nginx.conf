# /etc/nginx/sites-available/mydatatalk.ai
# Reverse proxy to the Next.js app (systemd service on 127.0.0.1:3000).
# Run `sudo certbot --nginx -d mydatatalk.ai -d www.mydatatalk.ai` after
# enabling this site — it rewrites this file to add the TLS server block.

server {
    listen 80;
    listen [::]:80;
    server_name mydatatalk.ai www.mydatatalk.ai;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
