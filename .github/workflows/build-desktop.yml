name: Build desktop apps

on:
  push:
    tags:
      - "v*"          # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ODBC driver (for Fabric connector)
        run: |
          brew tap microsoft/mssql-release https://github.com/Microsoft/homebrew-mssql-release
          HOMEBREW_ACCEPT_EULA=Y brew install msodbcsql18 unixodbc

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pywebview

      - name: Build .app with PyInstaller
        run: pyinstaller build.spec --noconfirm

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create .dmg
        run: |
          create-dmg \
            --volname "AI Data Analyst" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AIDataAnalyst.app" 150 190 \
            --app-drop-link 450 190 \
            "dist/AIDataAnalyst.dmg" \
            "dist/AIDataAnalyst.app"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIDataAnalyst-macOS
          path: dist/AIDataAnalyst.dmg

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AIDataAnalyst.dmg

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (.exe installer)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ODBC driver (for Fabric connector)
        run: |
          choco install sqlserver-odbcdriver -y

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pywebview

      - name: Build .exe with PyInstaller
        run: pyinstaller build.spec --noconfirm

      - name: Create installer with NSIS
        uses: joncloud/makensis-action@v4
        with:
          script-file: installer.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIDataAnalyst-Windows
          path: dist/AIDataAnalyst-Setup.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AIDataAnalyst-Setup.exe
